<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C3CE1"/>
      <stop offset="50%" stop-color="#E84393"/>
      <stop offset="100%" stop-color="#FDCB6E"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0FF"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF0F8"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDCB6E"/>
      <stop offset="100%" stop-color="#E84393"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGrad)"/>

  <!-- Subtle decorative circles -->
  <circle cx="280" cy="220" r="60" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="760" cy="340" r="40" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="800" cy="780" r="50" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="200" cy="750" r="35" fill="#FFFFFF" opacity="0.06"/>

  <!-- Card 1 (back, slightly tilted) -->
  <g filter="url(#shadow)" transform="translate(512,480) rotate(-8) translate(-512,-480)">
    <rect x="340" y="280" width="340" height="400" rx="40" ry="40" fill="url(#card1)" stroke="#E8E8F0" stroke-width="3"/>
    <!-- Card 1 back pattern - star -->
    <path d="M512 340 L528 395 L585 395 L538 430 L555 485 L512 450 L469 485 L486 430 L439 395 L496 395 Z" fill="url(#starGrad)"/>
  </g>

  <!-- Card 2 (front, slightly tilted opposite) -->
  <g filter="url(#shadow)" transform="translate(512,500) rotate(8) translate(-512,-500)">
    <rect x="344" y="290" width="340" height="400" rx="40" ry="40" fill="url(#card2)" stroke="#E8E8F0" stroke-width="3"/>
    <!-- Card 2 front - brain/lightbulb -->
    <g transform="translate(512,490)">
      <circle cx="0" cy="-20" r="50" fill="#6C3CE1" opacity="0.12"/>
      <path d="M-30,-20 Q-30,-55 0,-55 Q30,-55 30,-20 Q30,0 15,10 L15,20 L-15,20 L-15,10 Q-30,0 -30,-20 Z" fill="#6C3CE1" stroke="#6C3CE1" stroke-width="3" stroke-linejoin="round"/>
      <line x1="-8" y1="25" x2="8" y2="25" stroke="#6C3CE1" stroke-width="3" stroke-linecap="round"/>
      <line x1="-5" y1="32" x2="5" y2="32" stroke="#6C3CE1" stroke-width="3" stroke-linecap="round"/>
      <line x1="-8" y1="39" x2="8" y2="39" stroke="#6C3CE1" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-15" cy="-30" r="6" fill="#6C3CE1" opacity="0.3"/>
      <circle cx="20" cy="-25" r="4" fill="#6C3CE1" opacity="0.2"/>
      <circle cx="-22" cy="-10" r="3" fill="#6C3CE1" opacity="0.2"/>
    </g>
  </g>

  <!-- Sparkles -->
  <g fill="#FFFFFF">
    <path d="M720 280 L728 300 L748 308 L728 316 L720 336 L712 316 L692 308 L712 300 Z" opacity="0.9"/>
    <path d="M310 330 L315 342 L327 347 L315 352 L310 364 L305 352 L293 347 L305 342 Z" opacity="0.7"/>
  </g>
</svg>
